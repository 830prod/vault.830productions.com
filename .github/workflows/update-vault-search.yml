name: Update Vault Search

on:
  push:
    branches:
      - main
    paths:
      - "*.html"
      - ".github/workflows/update-vault-search.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-search-index:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate vault file list
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const files = fs.readdirSync(process.cwd())
            .filter((file) => /\.html?$/i.test(file))
            .filter((file) => file.toLowerCase() !== 'index.html')
            .sort((a, b) => a.localeCompare(b));

          fs.writeFileSync('vault-files.json', `${JSON.stringify(files, null, 2)}\n`);

          console.log(`Indexed ${files.length} vault page${files.length === 1 ? '' : 's'}.`);
          NODE

      - name: Commit updated vault file list
        run: |
          if git diff --quiet -- vault-files.json; then
            echo "Vault search index is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vault-files.json
          git commit -m "Update vault search index"
          git push
